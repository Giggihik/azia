{% extends 'base.html' %}
{% load static %}

{% block title %}Меню – Azia coded{% endblock %}

{% block content %}
<div id="notification" class="notification"></div>
<section class="page-hero">
    <div class="container">
        <h1>Меню</h1>
        <p>Аутентичные блюда азиатской кухни от шеф-повара. Попробуйте Азию на вкус!</p>
    </div>
</section>


<div class="cart-icon" id="cartIcon">
    <span class="cart-icon__badge" id="cartBadge">0</span>
    🛒
</div>


<div class="cart-panel" id="cartPanel">
    <div class="cart-panel__header">
    <h2>Ваш заказ</h2>
    <div class="cart-panel__header-actions">
        <button class="cart-panel__clear" id="clearCart">Очистить</button>
        <button class="cart-panel__close" id="closeCart">&times;</button>
    </div>
</div>
    <div class="cart-panel__items" id="cartItems">
        <p class="cart-panel__empty">Корзина пуста</p>
    </div>
    <div class="cart-panel__footer">
        <div class="cart-panel__total">
            Итого: <span id="cartTotal">0</span> ₽
        </div>
        <button class="btn btn--red cart-panel__checkout">Оформить заказ</button>
    </div>
</div>


<div class="cart-overlay" id="cartOverlay"></div>

<section class="menu-page container">
    <div class="menu-filters">
        <button class="filter-btn active" data-category="all">Все</button>
        <button class="filter-btn" data-category="супы">Супы</button>
        <button class="filter-btn" data-category="закуски">Закуски</button>
        <button class="filter-btn" data-category="горячее">Горячее</button>
        <button class="filter-btn" data-category="роллы">Роллы</button>
        <button class="filter-btn" data-category="напитки">Напитки</button>
        <button class="filter-btn" data-category="десерты">Десерты</button>
    </div>
    <div class="menu-grid" id="menuGrid">
        <!-- Карточки генерируются JS -->
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script src="{% static 'script/menu-data.js' %}"></script>
<script src="{% static 'script/menu.js' %}"></script>
{% endblock %}
